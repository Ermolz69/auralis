version: '3'

includes:
  fe:
    taskfile: ./taskfiles/frontend.yml
    aliases: [frontend]
  rs:
    taskfile: ./taskfiles/rust.yml
    aliases: [rust]
  q:
    taskfile: ./taskfiles/quality.yml
    aliases: [quality]
  docs:
    taskfile: ./taskfiles/docs.yml
  sec:
    taskfile: ./taskfiles/security.yml
    aliases: [security]

tasks:
  install:
    cmds:
      - pnpm install
      - cargo fetch

  dev:
    cmds:
      - pnpm --filter desktop dev

  check:frontend:
    cmds:
      - task: fe:all

  check:rust:
    cmds:
      - task: rs:all

  check:docs:
    cmds:
      - task: docs:all

  check:quality:frontend:
    cmds:
      - task: q:frontend

  check:colors:
    cmds:
      - task: q:color-tokens

  check:quality:docs:
    cmds:
      - task: q:docs

  check:quality:security:
    cmds:
      - task: sec:audit

  check:quality:global:
    cmds:
      - task: q:global

  check:all:
    cmds:
      - task: check:frontend
      - task: check:rust
      - task: check:docs
      - task: check:quality:frontend
      - task: check:quality:docs
      - task: check:quality:security
      - task: check:quality:global

  check:
    desc: Run all checks
    cmds:
      - task: check:all

  ci:
    desc: CI entrypoint
    cmds:
      - task: install
      - task: check
