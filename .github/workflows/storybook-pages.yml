name: Storybook Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook to Pages dir
        run: task frontend:storybook-pages

      - name: Create .nojekyll
        run: touch .pages/.nojekyll

      - name: Create index.html redirect
        run: |
          mkdir -p .pages
          echo '<meta http-equiv="refresh" content="0; url=/auralis/docs/storybook/" />' > .pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
