name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: 24
  PNPM_VERSION: 10
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
      quality: ${{ steps.filter.outputs.quality }}
      release: ${{ steps.filter.outputs.release }}
      ci: ${{ steps.filter.outputs.ci }}
      global: ${{ steps.filter.outputs.global }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Paths Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/desktop/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'eslint.config.mjs'
              - '.eslintrc*'
              - 'prettier.config.mjs'
              - '.prettierrc*'
              - 'tailwind.config.*'
              - 'vite.config.*'
              - '.storybook/**'
            rust:
              - 'crates/**'
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - '.clippy.toml'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'CHANGELOG.md'
              - '.markdownlint*'
            quality:
              - 'tools/scripts/**'
              - 'taskfiles/**'
            release:
              - '.github/workflows/release.yml'
              - '.github/workflows/tauri-build.yml'
              - 'src-tauri/tauri.conf.json'
              - 'src-tauri/capabilities/**'
              - 'src-tauri/permissions/**'
              - 'src-tauri/icons/**'
            ci:
              - '.github/workflows/**'
            global:
              - 'Taskfile.yml'
              - '.editorconfig'
              - '.prettier*'
              - '.eslint*'

  frontend:
    name: Frontend
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.global == 'true' || needs.changes.outputs.release == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend checks
        run: task check:frontend

      - name: Run frontend quality checks
        run: task check:quality:frontend

      - name: Run Storybook build check
        run: task frontend:storybook

  rust:
    name: Rust
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.global == 'true' || needs.changes.outputs.release == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          cache-on-failure: true

      - name: Setup Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Run rust checks
        run: task check:rust

  docs:
    name: Docs
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.global == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run docs checks
        run: task check:docs

      - name: Run docs quality checks
        run: task check:quality:docs

  quality-global:
    name: Global Quality
    needs: changes
    if: ${{ needs.changes.outputs.quality == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.global == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run global quality checks
        run: task check:quality:global

      - name: Run security checks
        run: task check:quality:security

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - frontend
      - rust
      - docs
      - quality-global
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            echo "CI Failed: One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "CI Passed: All required jobs passed or were properly skipped"
