version: '3'

tasks:
  frontend:
    cmds:
      - task: fsd-boundaries
      - task: color-tokens
      - task: file-size

  docs:
    cmds:
      - pnpm prettier --check "**/*.md"

  global:
    cmds:
      - task: format-check

  fsd-boundaries:
    cmds:
      - pnpm --filter desktop fsd-boundaries

  file-size:
    cmds:
      - node tools/scripts/check-file-size.mjs

  color-tokens:
    cmds:
      - node tools/scripts/check-raw-colors.mjs

  format-check:
    cmds:
      - pnpm prettier --check "**/*.{ts,tsx,css,json,yaml,yml,md}"

  format-write:
    cmds:
      - pnpm prettier --write "**/*.{ts,tsx,css,json,yaml,yml,md}"
