version: '3'

tasks:
  all:
    cmds:
      - task: fmt
      - task: clippy
      - task: check
      - task: test

  fmt:
    cmds:
      - cargo fmt --all -- --check

  fmt-write:
    cmds:
      - cargo fmt --all

  clippy:
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  test:
    cmds:
      - cargo test --workspace

  check:
    cmds:
      - cargo check --workspace
